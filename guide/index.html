  <style>
    .guideTop {
      overflow: hidden;
    }

    .guideTabsLine {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 16px;
      border-bottom: 1px solid #e5e7eb;
      scroll-behavior: smooth;
    }

    .guideTabsLine::-webkit-scrollbar {
      display: none;
    }

    .guideTabsLine::before,
    .guideTabsLine::after {
      content: "";
      flex: 0 0 4px;
    }

    .gLineTab {
      position: relative;
      flex: 0 0 auto;
      border: 0;
      background: transparent;
      padding: 14px 18px 16px;
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.25s ease;
    }

    .gLineIndicator {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 3px;
      border-radius: 999px;
      background: #2563eb;
      transform: translateX(0);
      transition: transform 0.3s ease, width 0.3s ease;
      will-change: transform, width;
      pointer-events: none;
    }
  </style>

  <script>
    (function () {
      const sel = document.getElementById("guideCategory");
      const nav = document.querySelector(".guideTabsLine");
      const tabs = Array.from(document.querySelectorAll(".gLineTab"));
      const indicator = document.querySelector(".gLineIndicator");

      const sections = {
        streaming: document.getElementById("sec-streaming"),
        download: document.getElementById("sec-download"),
        etc: document.getElementById("sec-etc"),
        list: document.getElementById("sec-list"),
      };

      if (!nav || !tabs.length || !indicator) return;

      function moveIndicatorTo(el) {
        if (!el) return;

        const navRect = nav.getBoundingClientRect();
        const rect = el.getBoundingClientRect();
        const left = rect.left - navRect.left + nav.scrollLeft;

        indicator.style.width = rect.width + "px";
        indicator.style.transform = "translateX(" + left + "px)";
      }

      function scrollTabIntoView(el) {
        if (!el) return;

        const navWidth = nav.clientWidth;
        const tabLeft = el.offsetLeft;
        const tabWidth = el.offsetWidth;

        const target = tabLeft - (navWidth / 2) + (tabWidth / 2);
        const maxScroll = nav.scrollWidth - navWidth;
        const nextLeft = Math.max(0, Math.min(target, maxScroll));

        nav.scrollTo({
          left: nextLeft,
          behavior: "smooth"
        });
      }

      function show(key, shouldScroll = true) {
        Object.keys(sections).forEach(k => {
          sections[k].hidden = (k !== key);
        });

        let activeBtn = null;

        tabs.forEach(btn => {
          const active = btn.dataset.key === key;
          btn.classList.toggle("isActive", active);
          btn.setAttribute("aria-selected", active ? "true" : "false");
          if (active) activeBtn = btn;
        });

        if (sel && sel.value !== key) {
          sel.value = key;
        }

        if (activeBtn) {
          moveIndicatorTo(activeBtn);
          if (shouldScroll) scrollTabIntoView(activeBtn);
        }
      }

      tabs.forEach(btn => {
        btn.addEventListener("click", () => {
          show(btn.dataset.key, true);
        });
      });

      if (sel) {
        sel.addEventListener("change", () => {
          show(sel.value, true);
        });
      }

      let rafId = null;
      nav.addEventListener("scroll", () => {
        const active = document.querySelector(".gLineTab.isActive");
        if (!active) return;

        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
          moveIndicatorTo(active);
        });
      }, { passive: true });

      window.addEventListener("resize", () => {
        const active = document.querySelector(".gLineTab.isActive");
        if (!active) return;
        moveIndicatorTo(active);
      });

      window.addEventListener("load", () => {
        const active = document.querySelector(".gLineTab.isActive");
        if (!active) return;
        moveIndicatorTo(active);
      });

      const initial = (sel && sel.value) ? sel.value : "streaming";
      show(initial, false);
    })();
  </script>
