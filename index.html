  <script>
    const openCollectModal = document.getElementById('openCollectModal');
    const collectModal = document.getElementById('collectModal');
    const collectOverlay = document.getElementById('collectOverlay');
    const collectClose = document.getElementById('collectClose');

    function openCollect() {
      collectModal.classList.add('is-open');
      collectModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeCollect() {
      collectModal.classList.remove('is-open');
      collectModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    if (openCollectModal) {
      openCollectModal.addEventListener('click', function(e) {
        e.preventDefault();
        openCollect();
      });
    }

    if (collectOverlay) {
      collectOverlay.addEventListener('click', closeCollect);
    }

    if (collectClose) {
      collectClose.addEventListener('click', closeCollect);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && collectModal.classList.contains('is-open')) {
        closeCollect();
      }
    });

    function updateHeroColorEffect() {
      const heroImg = document.querySelector(".heroImg");
      const isMobile = window.matchMedia("(max-width: 768px)").matches;

      if (!heroImg) return;

      if (!isMobile) {
        heroImg.classList.remove("is-color");
        return;
      }

      if (window.scrollY > 30) {
        heroImg.classList.add("is-color");
      } else {
        heroImg.classList.remove("is-color");
      }
    }

    window.addEventListener("scroll", updateHeroColorEffect);
    window.addEventListener("resize", updateHeroColorEffect);
    window.addEventListener("load", updateHeroColorEffect);
  </script>
